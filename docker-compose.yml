# docker-compose configuration for Virtual Coffee Machine
version: '3.8'

services:
  # MongoDB Service - Stores orders state
  mongodb:
    image: mongo:latest
    container_name: coffee_db
    restart: always
    ports:
      - "127.0.0.1:27017:27017" # Exposed only to localhost for direct database connection
    volumes:
      - mongo_data:/data/db # Database persistence volume

  # Redis Service - Message broker for BullMQ preparation queue
  redis:
    image: redis:alpine
    container_name: coffee_queue
    restart: always
    ports:
      - "127.0.0.1:6379:6379" # Exposed only to localhost for direct queue monitoring
    volumes:
      - redis_data:/data # Queue state persistence volume

  # Backend Service - Node/Express Server & BullMQ Worker
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coffee_backend
    restart: always
    ports:
      - "5000:5000" # REST API port mapped to host
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/coffee # Container-to-container DB URI
      - REDIS_HOST=redis                          # Container-to-container Redis host
      - REDIS_PORT=6379
    depends_on:
      - mongodb
      - redis

  # Frontend Service - React Client served via Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coffee_frontend
    restart: always
    ports:
      - "3000:80" # Maps Nginx port 80 to host port 3000
    depends_on:
      - backend

# Persistent Volumes declaration
volumes:
  mongo_data:
  redis_data:
